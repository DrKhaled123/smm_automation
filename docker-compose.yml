version: "3.9"

services:
  # ---------------------------------------------------------------------------
  # Steel Browser — open-source CDP-based browser automation server
  # Docs: https://github.com/steel-dev/steel-browser
  # ---------------------------------------------------------------------------
  steel:
    image: ghcr.io/steel-dev/steel:latest
    container_name: steel_browser
    ports:
      - "3000:3000"
    environment:
      - CONCURRENCY=10
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---------------------------------------------------------------------------
  # Redis — session state, rate-limit counters, cookie cache
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: smm_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ---------------------------------------------------------------------------
  # The automation app itself (optional — or run locally with python main.py)
  # ---------------------------------------------------------------------------
  automation:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smm_automation
    depends_on:
      steel:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      - STEEL_BASE_URL=http://steel:3000
      - REDIS_HOST=redis
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./cookies:/app/cookies
      - ./screenshots:/app/screenshots
    command: python main.py --mode daemon --browser steel
    restart: unless-stopped

volumes:
  redis_data:
